<!-- Conteúdo Principal -->
<div class="form-wrapper">
    <h2><strong><i class="fa-solid fa-truck"></i> Inserir novo fornecedor</strong></h2>
    <hr>
    <br>

    <form action="#" method="post" novalidate>

        <!-- Dados da empresa -->
        <div class="form-group">
            <label for="texto_nome">Nome da Empresa</label>
            <input type="text" name="nome_fornecedor" id="texto_nome" list="empresas" required>
            <datalist id="empresas">
                <option value="Philips Healthcare">
                <option value="Dräger">
                <option value="B. Braun">
                <option value="Siemens">
                <option value="Zoll Medical">
                <option value="Medtronic">
                <option value="Pentax Medical">
                <option value="Fresenius Medical Care">
            </datalist>
        </div>

        <div class="form-group">
            <label for="texto_nif">NIF</label>
            <input type="text" name="nif_fornecedor" id="texto_nif" required>
        </div>

        <div class="form-group">
            <label for="texto_morada">Morada <small>(NºPorta, Andar)</small></label>
            <input type="text" name="morada_fornecedor" id="texto_morada">
        </div>

        <div class="form-group">
            <label for="texto_telefone">Telefone</label>
            <input type="text" name="telefone_fornecedor" id="texto_telefone" required>
        </div>

        <div class="form-group">
            <label for="texto_email">Email</label>
            <input type="email" name="email_fornecedor" id="texto_email" required>
        </div>

        <div class="form-group">
            <label for="texto_website">Website</label>
            <input type="text" name="website_fornecedor" id="texto_website">
        </div>

        <div class="form-group">
            <label for="select_tipo">Tipo de Fornecedor</label>
            <select name="tipo_fornecedor" id="select_tipo">
                <option selected>Escolha uma opção</option>
                <option value="fabricante">Fabricante</option>
                <option value="distribuidor">Distribuidor / Fornecedor Comercial</option>
                <option value="assistencia">Empresa de Assistência Técnica</option>
                <option value="consumiveis">Fornecedor de Consumíveis / Acessórios</option>
            </select>
        </div>

        <!-- Pessoa de contacto -->
        <div class="form-group">
            <label for="texto_pessoa_contacto">Pessoa de Contacto</label>
            <input type="text" name="pessoa_contacto_fornecedor" id="texto_pessoa_contacto">
        </div>

        <div class="form-group">
            <label for="texto_telefone_contacto">Telefone da Pessoa de Contacto</label>
            <input type="text" name="telefone_contacto_fornecedor" id="texto_telefone_contacto">
        </div>

        <div class="form-group">
            <label for="texto_observacoes">Observações</label>
            <input type="text" name="observacoes_fornecedor" id="texto_observacoes">
        </div>

        <!-- Botões -->
        <div class="form-buttons text-center">
            <a href="fornecedores.html"><i class="fa-solid fa-xmark"></i> Cancelar</a>
            <button type="submit"><i class="fa-regular fa-floppy-disk"></i> Guardar</button>
        </div>

        <div class="alert text-center">
            Erro simples
        </div>

    </form>
</div>


</body>
</html>
