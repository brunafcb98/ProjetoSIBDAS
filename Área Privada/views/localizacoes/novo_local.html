<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquipFlow | Clinical Systems</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="../../../assets/images/icone1.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome (local) -->
    <link rel="stylesheet" href="../../../assets/fontawesome/all.min.css">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../../../assets/bootstrap/bootstrap.min.css">

    <!-- CSS - estilos da pagina -->
    <link rel="stylesheet" href="../../../assets/css/1241677_privado.css">
</head>
<body>

<!-- Navbar -->
<header class="container-fluid text-dark">
    <div class="row align-items-center">
        <div class="col-6 d-flex align-items-center p-3">
            <a href="../../dashboard.html">
                <img src="../../../assets/images/Logo1.png" alt="Logo da empresa" height="80" class="me-3">
            </a>
        </div>
        <div class="col-6 text-end p-3">
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="fa-regular fa-user me-2"></i> Utilizador
                </button>
                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#"><i class="fa-solid fa-key me-2"></i>Alterar password</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="../../login/login.html"><i class="fa-solid fa-right-from-bracket me-2"></i>Sair</a></li>
                </ul>
            </div>
        </div>
    </div>
</header>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <aside class="col-md-3 col-lg-2 text-white p-3 min-vh-100">
            <h4>Menu</h4>
            <nav>
                <a href="../../dashboard.html" class="nav-link text-white px-0 mb-2 d-block">
                    <i class="fas fa-home me-2"></i> Dashboard
                </a>
                <a href="../equipamentos/equipamentos.html" class="nav-link text-white px-0 mb-2 d-block">
                    <i class="fas fa-stethoscope me-2"></i> Equipamentos
                </a>
                <a href="localizacoes.html" class="nav-link text-white px-0 mb-2 d-block">
                    <i class="fas fa-map-marker-alt me-2"></i> Localizações
                </a>
                <a href="../fornecedores/fornecedores.html" class="nav-link text-white px-0 mb-2 d-block">
                    <i class="fas fa-truck me-2"></i> Fornecedores
                </a>
            </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="col-md-9 col-lg-10 p-4">
            <div class="d-flex justify-content-center mt-4">
                <div class="card w-100 shadow rounded" style="max-width: 1200px;">
                    <div class="card-body">
                        <h2 class="mb-4"><strong><i class="fa-solid fa-map-marker-alt me-2"></i> Inserir nova localização</strong></h2>
                        <hr>

                        <form action="#" method="post" novalidate>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="select_edificio" class="form-label">Edifício</label>
                                    <select class="form-select" name="edificio_localizacao" id="select_edificio" required>
                                        <option selected>Escolha uma opção</option>
                                        <option value="edificio_principal">Edifício Principal</option>
                                        <option value="edificio_a">Edifício A</option>
                                        <option value="edificio_b">Edifício B</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="select_piso" class="form-label">Piso</label>
                                    <select class="form-select" name="piso_localizacao" id="select_piso" required>
                                        <option selected>Escolha uma opção</option>
                                        <option value="piso_0">Piso 0</option>
                                        <option value="piso_1">Piso 1</option>
                                        <option value="piso_2">Piso 2</option>
                                        <option value="piso_3">Piso 3</option>
                                        <option value="piso_4">Piso 4</option>
                                        <option value="piso_5">Piso 5</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-12">
                                    <label for="texto_servico" class="form-label">Serviço</label>
                                    <input type="text" class="form-control" name="servico_localizacao" id="texto_servico" list="servicos" required>
                                    <datalist id="servicos">
                                        <option value="Unidade de Cuidados Intensivos">
                                        <option value="Unidade de Cuidados Intermédios">
                                        <option value="Urgência">
                                        <option value="Serviço de Medicina">
                                        <option value="Serviço de Cirurgia">
                                        <option value="Pediatria">
                                        <option value="Bloco Operatório">
                                        <option value="Imagiologia">
                                        <option value="Gastroenterologia">
                                        <option value="Laboratório">
                                        <option value="Farmácia">
                                        <option value="Administração">
                                    </datalist>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-12">
                                    <label for="texto_sala" class="form-label">Internamento / Sala / Gabinete</label>
                                    <input type="text" class="form-control" name="sala_localizacao" id="texto_sala">
                                </div>
                            </div>

                            <!-- Botões -->
                            <div class="d-flex justify-content-end gap-2 mb-4">
                                <a href="localizacoes.html" class="btn btn-outline-secondary">
                                    <i class="fa-solid fa-xmark me-1"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-regular fa-floppy-disk me-1"></i> Guardar
                                </button>
                            </div>

                            <!-- Mensagem de erro -->
                            <div class="alert alert-danger text-center" role="alert">
                                Erro simples
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </main>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="../../../assets/bootstrap/bootstrap.bundle.min.js"></script>

</body>
</html>
